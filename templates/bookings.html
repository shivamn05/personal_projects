{% extends "layout.html" %}

{% block title %}
    Bookings
{% endblock %}

{% block main %}
<h2 class="home-body">
    <p class="home-space">Your <span class="purple">Tooli</span><span class="blue">E</span> bookings</p>
</h2>
<p><input class="searchbar" type="text" id="searchInput" placeholder="Search..."></p>
<div class="mb-3">
    <table class="table table-hover" id="bookingsTable">
        <thead>
            <tr>
                <th class="text-start" scope="col">#</th>
                <th class="text-center" scope="col">Tool</th>
                <th class="text-center" scope="col">Date</th>
                <th class="text-center" scope="col">Time</th>
                <th class="text-end" scope="col">Completed</th>
                <th class="text-end" scope="col">Remove</th>
            </tr>
        </thead>
        <tbody>
            {% for booking in bookings %}
            <tr>
                <td class="text-start">{{ loop.index }}</td>
                <td class="text-center">{{ booking.tool_name }}</td>
                <td class="text-center">{{ booking.date }}</td>
                <td class="text-center">{{ booking.timeslot }}</td>
                <td class="text-end">
                    <form action="/completedbooking" method="post"><input type="submit" value="&#10003;">
                        <input name="user_id" hidden value={{booking.user_id}}>
                        <input name="tool_name" hidden value={{booking.tool_name}}>
                        <input name="date" hidden value={{booking.date}}>
                        <input name="timeslot" hidden value={{booking.timeslot}}>
                    </form>
                </td>
                <td class="text-end">
                    <form action="/removebooking" method="post"><input type="submit" value="&#10005;">
                        <input name="user_id" hidden value={{booking.user_id}}>
                        <input name="tool_name" hidden value={{booking.tool_name}}>
                        <input name="date" hidden value={{booking.date}}>
                        <input name="timeslot" hidden value={{booking.timeslot}}>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- From ChatGPT -->
<script>
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toLowerCase();
        const rows = document.querySelectorAll('#bookingsTable tbody tr');
    
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>
{% endblock %}
