{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <h2 class="home-body">
        <p class="home-space">Welcome to <span class="purple">Tooli</span><span class="blue">E</span></p>
    </h2>
    <form action="/" method="post">
        <div class="mb-3">Log In</div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="user_id" placeholder="User ID" type="text">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
        </div>
        <a class="btn btn-secondary" href="/change">Change Password</a>
        <button class="btn btn-primary" type="submit">Log In</button>
    </form>
{% endblock %}
